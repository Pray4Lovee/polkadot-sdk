name: Zombienet Polkadot

on:
  workflow_dispatch:
    inputs:
      test_pattern:
        type: string
        description: "Run tests matching this pattern"
        default: ""
        required: false
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  # ----------------------------
  # Preflight Checks
  # ----------------------------
  preflight:
    uses: ./.github/workflows/reusable-preflight.yml
    with:
      tests_yaml: .github/zombienet-tests/zombienet_parachain-template_tests.yml
      test_pattern: ${{ inputs.test_pattern }}

  # ----------------------------
  # Build Linux Stable
  # ----------------------------
  build-linux-stable:
    needs: preflight
    runs-on: ${{ needs.preflight.outputs.RUNNER }}
    container:
      image: ${{ needs.preflight.outputs.IMAGE }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Build Polkadot Binaries
        run: |
          forklift cargo build --locked --profile testnet --features pyroscope,fast-runtime \
            --bin polkadot --bin polkadot-prepare-worker --bin polkadot-execute-worker
          ROCOCO_EPOCH_DURATION=10 ./polkadot/scripts/build-only-wasm.sh rococo-runtime $(pwd)/runtimes/rococo-runtime-10/
          ROCOCO_EPOCH_DURATION=100 ./polkadot/scripts/build-only-wasm.sh rococo-runtime $(pwd)/runtimes/rococo-runtime-100/
          ROCOCO_EPOCH_DURATION=600 ./polkadot/scripts/build-only-wasm.sh rococo-runtime $(pwd)/runtimes/rococo-runtime-600/
      - name: Pack Artifacts
        run: |
          mkdir -p artifacts
          VERSION="${{ needs.preflight.outputs.SOURCE_REF_SLUG }}"
          mv target/testnet/polkadot artifacts/
          mv target/testnet/polkadot-prepare-worker artifacts/
          mv target/testnet/polkadot-execute-worker artifacts/
          mv runtimes/ artifacts/
          cd artifacts
          sha256sum polkadot | tee polkadot.sha256
          shasum -c polkadot.sha256
          EXTRATAG="${VERSION}-${COMMIT_SHA}"
          echo -n "${VERSION}" > VERSION
          echo -n "${EXTRATAG}" > EXTRATAG
          echo -n "${GITHUB_RUN_ID}" > BUILD_LINUX_JOB_ID
      - name: Create TAR
        run: tar -cvf artifacts.tar artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-stable-${{ needs.preflight.outputs.SOURCE_REF_SLUG }}
          path: artifacts.tar
          retention-days: 7

  # ----------------------------
  # Build Linux Stable Cumulus
  # ----------------------------
  build-linux-stable-cumulus:
    needs: preflight
    runs-on: ${{ needs.preflight.outputs.RUNNER }}
    container:
      image: ${{ needs.preflight.outputs.IMAGE }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Build Polkadot Parachain Binary
        run: |
          forklift cargo build --release --locked -p polkadot-parachain-bin --bin polkadot-parachain
          mkdir -p artifacts
          mv target/release/polkadot-parachain artifacts/
          echo -n "${{ needs.preflight.outputs.SOURCE_REF_SLUG }}" > artifacts/VERSION
      - name: Create TAR
        run: tar -cvf artifacts.tar artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-linux-stable-cumulus-${{ needs.preflight.outputs.SOURCE_REF_SLUG }}
          path: artifacts.tar
          retention-days: 7

  # ----------------------------
  # Build Test Parachain
  # ----------------------------
  build-test-parachain:
    needs: preflight
    runs-on: ${{ needs.preflight.outputs.RUNNER }}
    container:
      image: ${{ needs.preflight.outputs.IMAGE }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Build Test Parachain Binary
        run: |
          forklift cargo build --release --locked -p cumulus-test-service --bin test-parachain
          mkdir -p artifacts/zombienet
          mv target/release/test-parachain artifacts/
          mv target/release/wbuild/cumulus-test-runtime/wasm_binary_spec_version_incremented.rs.compact.compressed.wasm artifacts/zombienet/
      - name: Create TAR
        run: tar -cvf artifacts.tar artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-test-parachain-${{ needs.preflight.outputs.SOURCE_REF_SLUG }}
          path: artifacts.tar
          retention-days: 7

  # ----------------------------
  # Build Test Collators
  # ----------------------------
  build-test-collators:
    needs: preflight
    runs-on: ${{ needs.preflight.outputs.RUNNER }}
    container:
      image: ${{ needs.preflight.outputs.IMAGE }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Build Collators
        run: |
          forklift cargo build --locked --profile testnet -p test-parachain-adder-collator
          forklift cargo build --locked --profile testnet -p test-parachain-undying-collator
          mkdir -p artifacts
          mv target/testnet/adder-collator artifacts/
          mv target/testnet/undying-collator artifacts/
          echo -n "${{ needs.preflight.outputs.SOURCE_REF_SLUG }}" > artifacts/VERSION
      - name: Create TAR
        run: tar -cvf artifacts.tar artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-test-collators-${{ needs.preflight.outputs.SOURCE_REF_SLUG }}
          path: artifacts.tar
          retention-days: 7

  # ----------------------------
  # Run x402 Full 1-of-1 E2E
  # ----------------------------
  run-x402-e2e:
    runs-on: ubuntu-latest
    needs: [build-test-parachain, build-test-collators]
    steps:
      - uses: actions/checkout@v4
      - name: Run x402 full 1-of-1 E2E
        run: |
          chmod +x ./x402_full_1of1.sh
          ./x402_full_1of1.sh
      - name: Upload Ledger Artifact
        uses: actions/upload-artifact@v4
        with:
          name: x402-ledger
          path: ./ledger.json
          retention-days: 7

  # ----------------------------
  # Confirm All Required Builds Passed
  # ----------------------------
  confirm-required-build-jobs-passed:
    runs-on: ubuntu-latest
    needs: [build-linux-stable, build-linux-stable-cumulus, build-test-parachain, build-test-collators, run-x402-e2e]
    if: always() && !cancelled()
    steps:
      - name: Check build results
        run: |
          echo "Confirming required build jobs passed..."
          tee resultfile <<< '${{ toJSON(needs) }}'
          FAILURES=$(cat resultfile | grep '"result": "failure"' | wc -l)
          if [ $FAILURES -gt 0 ]; then
            echo "### At least one required job failed ❌" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo '### All required jobs passed 🚀' >> $GITHUB_STEP_SUMMARY
